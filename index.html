<!DOCTYPE html>
<html lang="en" class="launching">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cookbook</title>
  <link rel="stylesheet" href="css/styles.css?v=4"/>
  <link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Cookbook">
</head>
<body>

  <!-- ── LAUNCH SCREEN ── -->
  <div id="launch-screen">
    <div id="launch-lottie"></div>
  </div>

  <!-- ── TOOLBOX ── -->
  <div class="toolbox">
    <div class="toolbox-right">
      <div class="toolbox-pill" onclick="toggleTheme()" title="Toggle dark mode">
        <div class="toggle-track theme-track">
          <div class="toggle-thumb theme-thumb"></div>
        </div>
        <span class="toggle-label">Dark</span>
      </div>
    </div>
  </div>

  <div class="page">

    <!-- ── HEADER ── -->
    <header class="book-header">
      <div class="book-logotype-main">Cookbook</div>
    </header>

    <!-- ── SEARCH + NEW RECIPE ── -->
    <div class="home-controls">
      <div class="search-wrap">
        <span class="search-icon"><i data-feather="search"></i></span>
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="Search recipes by name, category, or tag…"
          oninput="filterRecipes()"
        />
      </div>
      <a href="new-recipe.html" class="btn-new-recipe">
        <i data-feather="plus"></i> New Recipe
      </a>
    </div>

    <!-- ── RECIPE GRID ── -->
    <div class="section-heading">
      <h2>All Recipes</h2>
    </div>
    <div class="recipe-grid" id="recipe-grid">
      <div class="loading-state">Loading recipes…</div>
    </div>

  </div><!-- /.page -->

  <!-- ── FEATHER ICONS ── -->
  <script src="https://unpkg.com/feather-icons"></script>

  <!-- ── FIREBASE SDKs ── -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="js/home.js"></script>
  <script>
    (function () {
      var screen = document.getElementById('launch-screen');
      function endLaunch() {
        screen.classList.add('fading');
        document.documentElement.classList.remove('launching');
        setTimeout(function () { screen.remove(); }, 280);
      }
      // Skip if navigating back/forward or reloading (not a fresh launch)
      var navEntry = window.performance && performance.getEntriesByType('navigation')[0];
      var navType  = navEntry ? navEntry.type : '';
      var fromInternal = document.referrer && document.referrer.startsWith(window.location.origin);
      if (navType === 'back_forward' || navType === 'reload' || fromInternal) {
        screen.remove();
        document.documentElement.classList.remove('launching');
        return;
      }
      var anim = lottie.loadAnimation({
        container: document.getElementById('launch-lottie'),
        renderer: 'svg',
        loop: false,
        autoplay: true,
        path: 'assets/loading.json'
      });
      anim.setSpeed(2);
      anim.addEventListener('complete', endLaunch);
      // Fallback: never block the app for more than 4s
      setTimeout(endLaunch, 4000);
    })();
  </script>
  <footer class="site-footer">
    <p>All rights reserved &copy; <span id="footer-year"></span></p>
  </footer>
  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
</body>
</html>
