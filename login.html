<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#f7f2ea" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f1612" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sign In — The Cookbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap">
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="css/styles.css?v=35"/>
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark');})();</script>
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- ── PAGE VEIL ── -->
  <div id="page-veil" style="position:fixed;inset:0;background:var(--cream);z-index:9998;pointer-events:none;opacity:1;"></div>

  <!-- ── TOOLBOX ── -->
  <div class="toolbox">
    <button type="button" class="toolbox-pill" onclick="history.back()" title="Go back" aria-label="Go back">
      <i data-feather="arrow-left"></i>
    </button>
    <div class="toolbox-right">
      <button type="button" class="toolbox-pill" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
        <div class="toggle-track theme-track">
          <div class="toggle-thumb theme-thumb"></div>
        </div>
        <div class="theme-icon-wrapper"><i data-feather="sun" class="theme-icon theme-icon-sun"></i><i data-feather="moon" class="theme-icon theme-icon-moon"></i></div>
      </button>
    </div>
  </div>

  <main class="page login-page" id="main-content">
    <header class="book-header">
      <div class="book-logotype-main"><em>The</em> <span class="logotype-shimmer">Cookbook</span></div>
      <div class="book-greeting" id="book-greeting"><script>!function(){var h=new Date().getHours();document.currentScript.parentNode.textContent=h<5?'A late night in the kitchen?':h<12?'Good morning \u2014 what are we making today?':h<17?'Good afternoon \u2014 something to cook tonight?':h<21?'Good evening \u2014 time to cook.':'A late night in the kitchen?';}()</script></div>
      <div class="book-header-rule"></div>
    </header>

    <div class="login-card">
      <div class="login-title">Welcome back</div>
      <p class="login-sub">Sign in to add and edit recipes.</p>

      <form id="login-form" onsubmit="handleSignIn(event)">
        <div class="form-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button class="btn-primary" id="btn-signin" type="submit">Sign In</button>
      </form>

      <p class="login-error" id="login-error" role="alert" aria-live="assertive" style="display:none;"></p>
    </div>
  </main>

  <!-- ── FEATHER ICONS ── -->
  <script src="https://unpkg.com/feather-icons"></script>

  <!-- ── FIREBASE SDKs ── -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js?v=15"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Fade out the page veil and animate sections in
    fadeOutVeil();
    gsap.from(['.book-header', '.login-card'], {
      opacity: 0, y: 20, duration: 0.5, stagger: 0.1, ease: 'power2.out', clearProps: 'all', delay: 0.1
    });

    // If already signed in, redirect immediately
    firebase.auth().onAuthStateChanged(function(user) {
      if (user) {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('redirect') || 'index.html';
        window.location.replace(redirect);
      }
    });

    function handleSignIn(e) {
      e.preventDefault();
      var btn = document.getElementById('btn-signin');
      var err = document.getElementById('login-error');
      var email = document.getElementById('login-email').value.trim();
      var password = document.getElementById('login-password').value;
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.style.display = 'none';

      signInWithEmail(email, password).catch(function(e) {
        var messages = {
          'auth/invalid-email':        'Please enter a valid email address.',
          'auth/user-not-found':       'No account found with that email address.',
          'auth/wrong-password':       'Incorrect password. Please try again.',
          'auth/invalid-credential':   'Incorrect email or password. Please try again.',
          'auth/too-many-requests':    'Too many attempts. Please wait a moment before trying again.',
          'auth/user-disabled':        'This account has been disabled.',
          'auth/network-request-failed': 'Network error. Check your connection and try again.'
        };
        err.textContent = messages[e.code] || 'Sign in failed. Please try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      });
    }
  </script>
  <footer class="site-footer">
    <p>All rights reserved &copy; <span id="footer-year"></span></p>
  </footer>
  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
</body>
</html>
