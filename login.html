<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Sign In — The Cookbook</title>
  <link rel="stylesheet" href="css/styles.css?v=18"/>
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark');})();</script>
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
</head>
<body>

  <!-- ── PAGE VEIL ── -->
  <div id="page-veil" style="position:fixed;inset:0;background:var(--cream);z-index:9998;pointer-events:none;transition:opacity 0.3s ease;opacity:1;"></div>

  <!-- ── TOOLBOX ── -->
  <div class="toolbox">
    <div class="toolbox-pill" onclick="history.back()" title="Go back">
      <i data-feather="arrow-left"></i>
    </div>
    <div class="toolbox-right">
      <div class="toolbox-pill" onclick="toggleTheme()" title="Toggle dark mode">
        <div class="toggle-track theme-track">
          <div class="toggle-thumb theme-thumb"></div>
        </div>
        <div class="theme-icon-wrapper"><i data-feather="sun" class="theme-icon theme-icon-sun"></i><i data-feather="moon" class="theme-icon theme-icon-moon"></i></div>
      </div>
    </div>
  </div>

  <div class="page login-page">
    <header class="book-header">
      <div class="book-logotype-main"><em>The</em> <span class="logotype-shimmer">Cookbook</span></div>
    </header>

    <div class="login-card">
      <div class="login-title">Welcome back</div>
      <p class="login-sub">Sign in to add and edit recipes.</p>

      <form id="login-form" onsubmit="handleSignIn(event)">
        <div class="form-field" style="margin-bottom:1rem;">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-field" style="margin-bottom:1.5rem;">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button class="btn-primary" id="btn-signin" type="submit" style="width:100%;">Sign In</button>
      </form>

      <p class="login-error" id="login-error" style="display:none;margin-top:1rem;"></p>
    </div>
  </div>

  <!-- ── FEATHER ICONS ── -->
  <script src="https://unpkg.com/feather-icons"></script>

  <!-- ── FIREBASE SDKs ── -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js?v=7"></script>
  <script src="js/auth.js"></script>
  <script>
    // Fade out the page veil
    fadeOutVeil();

    // If already signed in, redirect immediately
    firebase.auth().onAuthStateChanged(function(user) {
      if (user) {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('redirect') || 'index.html';
        window.location.replace(redirect);
      }
    });

    function handleSignIn(e) {
      e.preventDefault();
      var btn = document.getElementById('btn-signin');
      var err = document.getElementById('login-error');
      var email = document.getElementById('login-email').value.trim();
      var password = document.getElementById('login-password').value;
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.style.display = 'none';

      signInWithEmail(email, password).catch(function(e) {
        err.textContent = e.code + ': ' + e.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      });
    }
  </script>
  <footer class="site-footer">
    <p>All rights reserved &copy; <span id="footer-year"></span></p>
  </footer>
  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
</body>
</html>
