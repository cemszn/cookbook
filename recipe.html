<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#f7f2ea" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f1612" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Recipe — The Cookbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap">
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
  <link rel="stylesheet" href="css/styles.css?v=27"/>
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark');})();</script>
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon.png">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- ── PAGE VEIL (entry transition) ── -->
  <div id="page-veil" style="position:fixed;inset:0;background:var(--cream);z-index:9998;pointer-events:none;opacity:1;"></div>

  <!-- ── TOOLBOX ── -->
  <div class="toolbox">
    <div class="toolbox-pills">
      <button type="button" class="toolbox-pill" onclick="toolboxBack()" title="Go back" id="toolbox-back" aria-label="Go back">
        <i data-feather="arrow-left"></i>
      </button>
      <a href="index.html" class="toolbox-pill" title="Home" aria-label="Home">
        <i data-feather="home"></i>
      </a>
    </div>
    <div class="toolbox-right">
      <div class="toolbox-pills">
        <button type="button" class="toolbox-pill" id="auth-pill" title="Sign in"></button>
        <button type="button" class="toolbox-pill" onclick="toggleCookMode()" title="Cook Mode" id="cook-mode-pill" aria-label="Enter cook mode">
          <i data-feather="maximize-2"></i>
        </button>
        <button type="button" class="toolbox-pill" onclick="editRecipe()" title="Edit this recipe" id="edit-pill" data-auth="show" style="display:none;" aria-label="Edit recipe">
          <i data-feather="edit-3"></i>
        </button>
        <button type="button" class="toolbox-pill" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
          <div class="toggle-track theme-track">
            <div class="toggle-thumb theme-thumb"></div>
          </div>
          <div class="theme-icon-wrapper"><i data-feather="sun" class="theme-icon theme-icon-sun"></i><i data-feather="moon" class="theme-icon theme-icon-moon"></i></div>
        </button>
      </div>
      <button type="button" class="toolbox-pill toolbox-menu-btn" id="toolbox-menu-btn" onclick="toggleToolboxMenu(event)" aria-label="Open menu" aria-expanded="false" aria-haspopup="true">
        <i data-feather="menu"></i><span class="toggle-label">Menu</span>
      </button>
      <div class="toolbox-menu" id="toolbox-menu" role="menu">
        <button type="button" class="toolbox-menu-item" onclick="toggleCookMode();closeToolboxMenu()" role="menuitem"><i data-feather="maximize-2"></i>Cook</button>
        <button type="button" class="toolbox-menu-item" onclick="editRecipe();closeToolboxMenu()" data-auth="show" style="display:none;" role="menuitem"><i data-feather="edit-3"></i>Edit</button>
        <button type="button" class="toolbox-menu-item" onclick="signOutUser();closeToolboxMenu()" data-auth="show" style="display:none;" role="menuitem"><i data-feather="log-out"></i>Sign Out</button>
        <button type="button" class="toolbox-menu-item" onclick="toggleTheme();closeToolboxMenu()" role="menuitem">
          <div class="toggle-track theme-track"><div class="toggle-thumb theme-thumb"></div></div>
          Dark
        </button>
      </div>
    </div>
  </div>

  <!-- Hidden live region for screen reader step announcements (cook mode) -->
  <div id="cook-step-live" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <main class="page" id="main-content">
    <div id="recipe-page">
      <!-- Content injected by recipe.js -->
    </div>
  </main>

  <!-- ── COOK MODE OVERLAY ── -->
  <div class="cook-overlay" id="cook-overlay" role="dialog" aria-modal="true" aria-label="Cook mode">
    <div class="cook-inner">

      <div class="cook-topbar">
        <div class="cook-topbar-title" id="cook-recipe-name"></div>
        <div class="cook-topbar-controls">
          <div class="cook-progress-dots" id="cook-dots" role="list" aria-label="Recipe progress"></div>
          <button class="cook-close-btn" onclick="closeCookMode()" aria-label="Exit cook mode"><i data-feather="x"></i>&nbsp;Exit</button>
        </div>
      </div>

      <div class="cook-stage">
        <div class="cook-step-wrap" id="cook-step-wrap">
          <div class="cook-step-label" id="cook-step-label">Step 1</div>
          <div class="cook-step-header">
            <div class="cook-step-number-large" id="cook-step-numeral"></div>
            <div class="cook-step-title-large" id="cook-step-title"></div>
          </div>
          <p class="cook-step-body" id="cook-step-body"></p>
          <div class="cook-step-tip" id="cook-step-tip"></div>
        </div>
      </div>

      <div class="cook-bottombar" id="cook-bottombar">
        <div class="cook-nav-btns">
          <button class="cook-nav-btn cook-btn-ingredients" id="cook-ingredients-btn" onclick="toggleCookIngredients()"><i data-feather="list"></i><span class="btn-label"> Ingredients</span></button>
          <button class="cook-nav-btn cook-btn-prev" id="cook-prev" onclick="cookPrev()"><i data-feather="arrow-left"></i><span class="btn-label"> Previous</span></button>
          <button class="cook-nav-btn cook-btn-next" id="cook-next" onclick="cookNext()"><span class="btn-label">Next </span><i data-feather="arrow-right"></i></button>
        </div>
        <div class="cook-timer">
          <div class="cook-timer-display">
            <div class="cook-timer-digits" id="cook-timer-digits">00:00:00</div>
            <div class="cook-timer-label">
              <span>hr</span><span class="cook-timer-spacer"></span><span>min</span><span class="cook-timer-spacer"></span><span>sec</span>
            </div>
          </div>
          <div class="cook-timer-btns">
            <button class="cook-timer-btn cook-timer-btn-start" id="cook-timer-start" onclick="timerToggle()" title="Start / Pause"><i data-feather="play"></i></button>
            <button class="cook-timer-btn cook-timer-btn-reset" onclick="timerReset()" title="Reset"><i data-feather="rotate-ccw"></i></button>
          </div>
        </div>
      </div>

    </div>

    <!-- ── INGREDIENTS SHEET ── -->
    <div class="cook-ingredients-backdrop" id="cook-ingredients-backdrop"
         onclick="closeCookIngredients()"></div>
    <div class="cook-ingredients-sheet" id="cook-ingredients-sheet">
<div class="cook-ingredients-header">
        <span class="cook-ingredients-title">Ingredients</span>
        <button class="cook-nav-btn cook-ingredients-close" onclick="closeCookIngredients()"><i data-feather="x"></i> Close</button>
      </div>
      <div class="cook-ingredients-body" id="cook-ingredients-body"></div>
    </div>

  </div>

  <!-- ── CELEBRATION SCREEN ── -->
  <div class="cook-celebration" id="cook-celebration" role="dialog" aria-modal="true" aria-labelledby="cook-celeb-title" aria-describedby="cook-celebration-sub">
    <div class="cook-celebration-lottie" id="cook-lottie" aria-hidden="true"></div>
    <div class="cook-celebration-text">
      <div class="cook-celebration-title" id="cook-celeb-title">Bon <em>Appétit</em></div>
      <p class="cook-celebration-sub" id="cook-celebration-sub"></p>
    </div>
    <button type="button" class="cook-celebration-close-btn" onclick="closeCelebration()" aria-label="Finish cooking">
      <div class="cook-celebration-hint">Tap anywhere to finish</div>
    </button>
  </div>

  <!-- ── FEATHER ICONS ── -->
  <script src="https://unpkg.com/feather-icons"></script>

  <!-- ── FIREBASE SDKs ── -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js?v=8"></script>
  <script src="js/auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/recipe.js?v=6"></script>
  <footer class="site-footer">
    <p>All rights reserved &copy; <span id="footer-year"></span></p>
  </footer>
  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
</body>
</html>
